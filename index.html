<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Maison Dorée — Menu Journal</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}

  :root{
    --paper:#f2e8d0;
    --paper-dark:#e8dcc0;
    --ink:#1a1208;
    --ink-light:#3a2e1a;
    --ink-faded:#6b5a3a;
    --rule:#2a1f08;
    --accent:#8b1a1a;
  }

  body{
    background: #2c2016;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:2rem 1rem;
    font-family:'IM Fell English',serif;
  }

  /* MASTHEAD above book */
  .masthead{
    text-align:center;
    margin-bottom:0.8rem;
    color:#c8a96e;
  }
  .masthead-title{
    font-family:'UnifrakturMaguntia',cursive;
    font-size:clamp(1.6rem,4vw,2.8rem);
    letter-spacing:2px;
    line-height:1.1;
    text-shadow:0 0 20px rgba(200,169,110,0.4);
  }
  .masthead-sub{
    font-family:'Libre Baskerville',serif;
    font-size:0.7rem;
    letter-spacing:5px;
    text-transform:uppercase;
    color:#a08050;
    margin-top:0.2rem;
  }

  /* BOOK CONTAINER */
  .book-wrap{
    perspective:2000px;
    width:min(960px, 98vw);
  }

  .book{
    display:flex;
    width:100%;
    position:relative;
  }

  /* Individual page */
  .page-wrap{
    width:50%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.8s cubic-bezier(0.645,0.045,0.355,1.000);
    transform-origin: right center;
  }
  .page-wrap.is-right{
    transform-origin:left center;
  }
  .page-wrap.flipping-left{
    transform: rotateY(-180deg);
    z-index:10;
  }
  .page-wrap.flipping-right{
    transform: rotateY(180deg);
    z-index:10;
  }

  .page{
    background:var(--paper);
    min-height:700px;
    padding:1.2rem;
    position:relative;
    overflow:hidden;
    box-shadow: inset -4px 0 8px rgba(0,0,0,0.08);
  }
  .page-wrap.is-right .page{
    box-shadow: inset 4px 0 8px rgba(0,0,0,0.08);
  }

  /* Paper texture via repeating dots */
  .page::before{
    content:'';
    position:absolute;inset:0;
    background-image: radial-gradient(circle, rgba(139,110,50,0.08) 1px, transparent 1px);
    background-size:4px 4px;
    pointer-events:none;z-index:0;
  }
  .page > *{position:relative;z-index:1;}

  /* Spine shadow */
  .spine{
    width:20px;
    background: linear-gradient(to right, #1a1208, #3a2e1a 40%, #2a2010 60%, #1a1208);
    flex-shrink:0;
    align-self:stretch;
    position:relative;z-index:5;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
  }

  /* PAGE HEADER (paper top bar) */
  .pg-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-top:2px solid var(--rule);
    border-bottom:1px solid var(--rule);
    padding:3px 0;
    margin-bottom:0.8rem;
    font-family:'Libre Baskerville',serif;
    font-size:0.6rem;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--ink-faded);
  }
  .pg-num{font-weight:700;color:var(--ink)}

  /* MASTHEAD inside page 1 */
  .inner-masthead{
    text-align:center;
    border-bottom:3px double var(--rule);
    padding-bottom:0.6rem;
    margin-bottom:0.7rem;
  }
  .inner-masthead .paper-name{
    font-family:'UnifrakturMaguntia',cursive;
    font-size:clamp(1.4rem,4vw,2.4rem);
    color:var(--ink);
    line-height:1;
  }
  .inner-masthead .paper-meta{
    font-size:0.6rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--ink-faded);
    margin-top:2px;
    font-family:'Libre Baskerville',serif;
  }
  .inner-masthead .paper-tagline{
    font-size:0.75rem;
    font-style:italic;
    color:var(--ink-light);
    margin-top:3px;
    border-top:1px solid var(--rule);
    padding-top:3px;
  }

  /* COLUMN LAYOUTS */
  .cols-2{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
  .cols-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem}
  .col-span-2{grid-column:span 2}
  .col-span-3{grid-column:span 3}

  /* VERTICAL RULES */
  .v-rule{border-left:1px solid var(--rule)}

  /* HEADLINE STYLES */
  .headline-xl{
    font-family:'Playfair Display',serif;
    font-size:clamp(1.4rem,3vw,2.2rem);
    font-weight:900;
    line-height:1.05;
    color:var(--ink);
    text-transform:uppercase;
  }
  .headline-lg{
    font-family:'Playfair Display',serif;
    font-size:clamp(1rem,2.2vw,1.5rem);
    font-weight:700;
    line-height:1.1;
    color:var(--ink);
  }
  .headline-md{
    font-family:'Playfair Display',serif;
    font-size:clamp(0.85rem,1.8vw,1.1rem);
    font-weight:700;
    line-height:1.2;
    color:var(--ink);
  }
  .headline-sm{
    font-family:'Playfair Display',serif;
    font-size:0.85rem;
    font-weight:700;
    line-height:1.2;
    color:var(--ink);
    font-style:italic;
  }
  .kicker{
    font-family:'Libre Baskerville',serif;
    font-size:0.6rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:2px;
  }
  .subhead{
    font-family:'IM Fell English',serif;
    font-style:italic;
    font-size:0.78rem;
    color:var(--ink-faded);
    margin-top:3px;
    margin-bottom:6px;
    border-bottom:1px solid var(--rule);
    padding-bottom:4px;
  }

  /* BODY TEXT */
  .body-text{
    font-family:'IM Fell English',serif;
    font-size:0.72rem;
    line-height:1.55;
    color:var(--ink-light);
    text-align:justify;
    hyphens:auto;
  }
  .drop-cap::first-letter{
    font-family:'Playfair Display',serif;
    font-size:3em;
    float:left;
    line-height:0.75;
    margin:0.05em 0.06em 0 0;
    color:var(--ink);
    font-weight:900;
  }

  /* MENU ITEM in newspaper style */
  .menu-entry{margin-bottom:0.5rem}
  .menu-entry-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom:1px dotted #9a8060;
    padding-bottom:1px;
    margin-bottom:2px;
  }
  .menu-entry-name{
    font-family:'Playfair Display',serif;
    font-size:0.78rem;
    font-weight:700;
    color:var(--ink);
  }
  .menu-entry-price{
    font-family:'Libre Baskerville',serif;
    font-size:0.72rem;
    color:var(--accent);
    font-weight:700;
    white-space:nowrap;
  }
  .menu-entry-desc{
    font-size:0.66rem;
    font-style:italic;
    color:var(--ink-faded);
    line-height:1.4;
    font-family:'IM Fell English',serif;
  }

  /* SECTION RULE */
  .section-rule{
    display:flex;
    align-items:center;
    gap:4px;
    margin:0.6rem 0 0.5rem;
  }
  .section-rule::before,.section-rule::after{
    content:'';flex:1;height:1px;background:var(--rule);
  }
  .section-rule span{
    font-family:'Libre Baskerville',serif;
    font-size:0.6rem;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--ink);
    white-space:nowrap;
    padding:0 4px;
  }

  /* BOX / ADVERTORIAL */
  .box{
    border:1.5px solid var(--rule);
    padding:0.5rem 0.6rem;
    margin:0.6rem 0;
    position:relative;
  }
  .box-double{border:2px double var(--rule)}
  .box-title{
    font-family:'Playfair Display',serif;
    font-size:0.8rem;
    font-weight:700;
    text-align:center;
    background:var(--ink);
    color:var(--paper);
    padding:2px 6px;
    margin:-0.5rem -0.6rem 0.4rem;
    letter-spacing:1px;
    text-transform:uppercase;
  }

  /* HR ORNAMENT */
  .ornament{
    text-align:center;
    color:var(--ink-faded);
    font-size:0.75rem;
    letter-spacing:4px;
    margin:0.4rem 0;
  }

  /* PHOTO PLACEHOLDER */
  .photo-box{
    background:var(--paper-dark);
    border:1px solid var(--rule);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:0.6rem;
    font-style:italic;
    color:var(--ink-faded);
    font-family:'Libre Baskerville',serif;
    text-align:center;
    line-height:1.4;
    padding:0.5rem;
  }

  /* PAGE TURN BUTTONS */
  .controls{
    display:flex;
    justify-content:center;
    gap:1.5rem;
    margin-top:1rem;
  }
  .ctrl-btn{
    background:none;
    border:1px solid #a08050;
    color:#c8a96e;
    font-family:'Libre Baskerville',serif;
    font-size:0.75rem;
    letter-spacing:2px;
    text-transform:uppercase;
    padding:0.4rem 1.2rem;
    cursor:pointer;
    transition:all 0.2s;
  }
  .ctrl-btn:hover{background:#a08050;color:#1a1208}
  .ctrl-btn:disabled{opacity:0.3;cursor:default}

  .page-indicator{
    text-align:center;
    color:#a08050;
    font-family:'Libre Baskerville',serif;
    font-size:0.65rem;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-top:0.6rem;
  }

  hr.thin{border:none;border-top:1px solid var(--rule);margin:0.4rem 0}
  hr.thick{border:none;border-top:2.5px solid var(--rule);margin:0.4rem 0}
  hr.double{
    border:none;
    border-top:1px solid var(--rule);
    margin:0.4rem 0;
    padding-top:2px;
    border-bottom:1px solid var(--rule);
    height:3px;
  }

  @media(max-width:600px){
    .cols-2,.cols-3{grid-template-columns:1fr}
    .col-span-2,.col-span-3{grid-column:span 1}
  }
</style>
</head>
<body>

<div class="masthead">

<div class="controls">

<div class="page-indicator" id="pageIndicator">Pages 1 – 2 sur 8</div>

let currentSpread = 0; // 0 = pages 0-1, 1 = pages 2-3, etc.
const totalSpreads = Math.ceil(pages.length / 2);

function render() {
  const l = currentSpread * 2;
  const r = l + 1;
  document.getElementById('leftContent').innerHTML = pages[l] || '';
  document.getElementById('rightContent').innerHTML = pages[r] || '';
  document.getElementById('prevBtn').disabled = currentSpread === 0;
  document.getElementById('nextBtn').disabled = currentSpread >= totalSpreads - 1;
  document.getElementById('pageIndicator').textContent =
    `Pages ${l+1} – ${Math.min(r+1, pages.length)} sur ${pages.length}`;
}

function turnPage(dir) {
  const lp = document.getElementById('leftPage');
  const rp = document.getElementById('rightPage');
  if (dir === 1 && currentSpread < totalSpreads - 1) {
    rp.classList.add('flipping-left');
    setTimeout(() => {
      rp.classList.remove('flipping-left');
      currentSpread++;
      render();
    }, 400);
  } else if (dir === -1 && currentSpread > 0) {
    lp.classList.add('flipping-right');
    setTimeout(() => {
      lp.classList.remove('flipping-right');
      currentSpread--;
      render();
    }, 400);
  }
}

render();
</script>
